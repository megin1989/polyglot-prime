<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/prime}">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Profile</title>
	
 

<style>
body{
    margin:0;
    padding:40px 20px;
    background:#f5f7fb;
    font-family:Inter,Arial,sans-serif;
}

.profile-card{
    /* max-width:850px; */
    margin:auto;
    background:#fff;
    border:1px solid #e9ecef;
    border-radius:12px;
    padding:25px;
    display:flex;
    align-items:center;
    gap:32px;
}

.profile-image{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
}

.profile-details{
    flex:1;
}

.profile-details h2{
    margin:0 0 16px;
    font-size:26px;
    font-weight:600;
    color:#222;
}

.profile-details p{
    margin:10px 0;
    font-size:17px;
    color:#666;
    word-break:break-word;
}

/* Mobile */
@media (max-width:768px){

    .profile-card{
        flex-direction:column; 
        padding:24px;
        gap:20px;
    }

    .profile-image{
        width:110px;
        height:110px;
    }

    .profile-details h2{
        font-size:26px;
    }

    .profile-details p{
        font-size:16px;
    }

}
</style>
</head>

<body>
<div layout:fragment="content" class="p-6 bg-gray-50 min-h-screen"> 
<div class="profile-card">

     <img th:src="${#authentication.principal.attributes['avatar_url']}" 
                    class="profile-image" alt="User Avatar">

    <div class="profile-details">

        <h2>[[${#strings.listJoin(#authentication.principal.attributes['name'], ', ')}]]</h2>

        <!-- Show only if email exists -->
        <p>[[${#authentication.principal.attributes['email']}]]</p>

        <!-- Show only if role exists -->
        <p>[[${#authentication.principal.attributes['role']}]]</p>

        <!-- Show only if tenant exists -->
        <p th:unless="${#lists.contains(#authentication.principal.attributes['role'], 'Super_Admin')}">
            [[${#strings.listJoin(#authentication.principal.attributes['groupNames'], ', ')}]]
        </p>

    </div>

</div>
 
</div>
</body>
</html>
